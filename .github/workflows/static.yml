<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sade ve Modern Web Sitesi</title>
    <style>
        /* Temel Sıfırlamalar ve Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        /* Navigasyon Barı */
        nav {
            background-color: #ffffff;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 24px;
            font-weight: bold;
            color: #2d3748;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #3182ce;
        }

        /* Ana Kahraman (Hero) Bölümü */
        .hero {
            background-color: #ffffff;
            padding: 80px 10%;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .hero h1 {
            font-size: 42px;
            color: #1a202c;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: #718096;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .btn {
            display: inline-block;
            background-color: #3182ce;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: background 0.3s;
        }

